# Run `fly launch --no-deploy --copy-config` once to register the app
# under your Fly account, then this file becomes the source of truth.
# `fly launch` will prompt for an app name + region and update this file
# in place.

app = "next-sanity-template"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # NEXT_PUBLIC_* values are inlined into the client bundle at build
  # time. They are NOT secret. Override per-environment via
  # `fly deploy --build-arg KEY=value` or by editing this block.
  [build.args]
    NEXT_PUBLIC_SANITY_DATASET = "production"
    NEXT_PUBLIC_SANITY_API_VERSION = "2024-10-01"
    # Set these for your project before deploying:
    # NEXT_PUBLIC_SANITY_PROJECT_ID = "xxxxxxxx"
    # NEXT_PUBLIC_SITE_URL = "https://your-app.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
