name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # NEXT_PUBLIC_* values are required at build time so lib/env.ts
        # doesn't throw. Use safe placeholders for CI.
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: "2024-10-01"
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build
