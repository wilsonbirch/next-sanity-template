name: Deploy to Fly

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Fly deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Build args + runtime env are configured in fly.toml.
      # Runtime secrets (RESEND_API_KEY, SANITY_API_READ_TOKEN, etc.)
      # are set via `fly secrets set`.
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
